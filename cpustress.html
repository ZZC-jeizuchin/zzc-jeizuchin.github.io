<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>CPU 压力测试 · SwCTools</title>
  <style>
    /* ===== 主蓝色变量体系（与 index.html 一致） ===== */
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.85);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --badge-bg: #d0e2f0;
      --badge-color: #2c6182;
      --cat-btn-bg: #d9e8f4;
      --cat-btn-border: #adc7e0;
      --cat-btn-color: #1a4059;
      --cat-btn-hover-bg: #c2d8ed;
      --jump-row-bg: #e7f0f9;
      --jump-row-border: #c1d6ea;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
      --go-btn-bg: #4f7f9e;
      --go-btn-hover-bg: #3a6b8c;
      --tool-btn-bg: #cddef0;
      --tool-btn-border: #a3bed8;
      --tool-btn-color: #1a4765;
      --device-item-bg: #eaf2fc;
      --device-label-color: #1e4b6e;
      --device-value-color: #0d3450;
      --text-color: #173e58;
      --corner-text-color: #3a6a8e;
      --fps-bg: rgba(255, 255, 255, 0.6);
      --stress-btn-bg: #4f7f9e;
    }

    [data-theme="dark"] {
      --bg-body: #0a0f14;
      --panel-bg: rgba(13, 27, 42, 0.9);
      --panel-border: #1e3a5a;
      --title-color: #a0c4e8;
      --badge-bg: #1a3a5c;
      --badge-color: #b0d0f0;
      --cat-btn-bg: #1e3a5a;
      --cat-btn-border: #2a5a8a;
      --cat-btn-color: #c0d8f0;
      --cat-btn-hover-bg: #2a5a8a;
      --jump-row-bg: #122a3e;
      --jump-row-border: #1e4a6e;
      --input-border: #2a5a8a;
      --input-focus-border: #5a9ac0;
      --go-btn-bg: #2a6a9e;
      --go-btn-hover-bg: #1a4a7a;
      --tool-btn-bg: #1e3a5a;
      --tool-btn-border: #2a5a8a;
      --tool-btn-color: #c0d8f0;
      --device-item-bg: #122a3e;
      --device-label-color: #a0c4e8;
      --device-value-color: #d0e0f0;
      --text-color: #c0d8f0;
      --corner-text-color: #7a9ab0;
      --fps-bg: rgba(0, 0, 0, 0.5);
      --stress-btn-bg: #2a6a9e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; position: relative; }

    /* 角落文字（与 index.html 完全一致） */
    .corner-tl { position: fixed; top: 12px; left: 16px; font-size: 0.75rem; color: var(--corner-text-color); opacity: 0.8; z-index: 3000; pointer-events: none; }
    .corner-tr { position: fixed; top: 12px; right: 20px; font-size: 0.75rem; color: var(--corner-text-color); opacity: 0.8; z-index: 3000; pointer-events: none; background: var(--fps-bg); padding: 4px 12px; border-radius: 24px; border: 1px solid var(--panel-border); }
    .corner-br { position: fixed; bottom: 12px; right: 20px; font-size: 0.75rem; color: var(--corner-text-color); opacity: 0.8; z-index: 3000; pointer-events: none; }
    .theme-toggle { position: fixed; bottom: 12px; left: 16px; font-size: 1rem; background: var(--cat-btn-bg); border: 1px solid var(--panel-border); color: var(--corner-text-color); padding: 6px 16px; border-radius: 32px; cursor: pointer; opacity: 0.85; transition: 0.2s; z-index: 3000; font-weight: 500; }
    .theme-toggle:hover { opacity: 1; background: var(--cat-btn-hover-bg); }

    .main-panel { max-width: 660px; width: 100%; background: var(--panel-bg); border-radius: 28px; box-shadow: 0 16px 30px -8px rgba(30, 65, 90, 0.18); border: 1px solid var(--panel-border); padding: 26px 28px 32px; }
    .title-section { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--panel-border); }
    .title-section h1 { font-weight: 550; font-size: 2rem; color: var(--title-color); }
    .badge { color: var(--badge-color); background: var(--badge-bg); padding: 6px 18px; border-radius: 40px; font-size: 0.9rem; border: 1px solid var(--cat-btn-border); }
    
    .slider-container { margin: 18px 0 24px; }
    .slider-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 500; color: var(--text-color); }
    .slider-header span { background: var(--jump-row-bg); padding: 5px 18px; border-radius: 36px; font-family: monospace; border: 1px solid var(--panel-border); }
    input[type=range] { width: 100%; margin: 8px 0; -webkit-appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 8px; background: var(--jump-row-bg); border-radius: 10px; border: 1px solid var(--panel-border); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 24px; background: var(--go-btn-bg); margin-top: -9px; box-shadow: 0 2px 8px rgba(30,75,110,0.3); border: 2px solid #d0e4f5; cursor: grab; }

    .stress-btn-group { display: flex; gap: 16px; margin: 20px 0 24px; }
    .stress-btn { background: var(--stress-btn-bg); border: none; color: white; padding: 16px 20px; border-radius: 60px; font-weight: 650; font-size: 1.3rem; cursor: pointer; flex: 1; text-align: center; transition: all 0.15s; box-shadow: 0 6px 0 #1e3a5a; text-transform: uppercase; letter-spacing: 1px; }
    .stress-btn.secondary { background: var(--tool-btn-bg); border: 1px solid var(--tool-btn-border); color: var(--tool-btn-color); box-shadow: 0 5px 0 #8a9eb0; }
    .stress-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #1a2e4a; }
    .stress-btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 6px 0 #4a5a6a; background: #6a7a8a; cursor: not-allowed; }

    .status-panel { background: var(--device-item-bg); border-radius: 24px; padding: 20px 24px; margin-top: 8px; border: 1px solid var(--panel-border); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .status-item { display: flex; align-items: baseline; gap: 8px; }
    .status-label { color: var(--device-label-color); font-size: 0.85rem; text-transform: uppercase; }
    .status-value { font-weight: 700; font-size: 1.5rem; font-family: monospace; color: var(--title-color); }
    #activeWorkers, #computeSpeed { color: #d96500; }

    .warning-note { margin-top: 22px; font-size: 0.9rem; color: #cc7f2a; background: rgba(255, 140, 0, 0.08); padding: 14px 20px; border-radius: 24px; border-left: 6px solid #e06b00; }
    .hint-text { font-size: 0.8rem; color: var(--corner-text-color); margin-top: 6px; text-align: right; }
    
    .back-link { display: inline-block; margin-top: 16px; color: var(--corner-text-color); text-decoration: none; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 480px) { .main-panel { padding: 20px 18px 24px; } .stress-btn-group { flex-direction: column; } .status-panel { flex-direction: column; align-items: flex-start; gap: 12px; } }
  </style>
</head>
<body>
<!-- 与 index.html 完全一致的角落文字 -->
<div class="corner-tl">不自由毋宁死 · 不自由毋寧死 · Give me liberty or give me death · 自由か、死か</div>
<div class="corner-tr" id="fpsDisplay">FPS: --</div>
<div class="corner-br">made by ZZC-jeizuchin, Github</div>
<button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">深色</button>

<div class="main-panel">
  <div class="title-section">
    <h1>CPU 压力测试</h1>
    <span class="badge" id="coresDisplay">--</span>
  </div>

  <div class="slider-container">
    <div class="slider-header">
      <label>工作线程数 (最大32)</label>
      <span id="threadValue">8</span>
    </div>
    <input type="range" id="threadSlider" min="1" max="32" value="8" step="1">
    <div class="hint-text">硬件核心: <span id="coreHint"></span> · 推荐 8~12 线程发热最猛</div>
  </div>

  <div class="stress-btn-group">
    <button class="stress-btn" id="startBtn">开始</button>
    <button class="stress-btn secondary" id="stopBtn" disabled>停止</button>
  </div>

  <div class="status-panel">
    <div class="status-item"><span class="status-label">状态</span><span class="status-value" id="statusText">空闲</span></div>
    <div class="status-item"><span class="status-label">运行时长</span><span class="status-value" id="timerDisplay">00:00</span></div>
    <div class="status-item"><span class="status-label">活跃线程</span><span class="status-value" id="activeWorkers">0</span></div>
    <div class="status-item"><span class="status-label">计算速度</span><span class="status-value" id="computeSpeed">0 ops</span></div>
  </div>

  <div class="warning-note">
    线程数超过物理核心时，CPU调度压力剧增，可能造成系统短暂卡顿。平板请留意散热。
  </div>
  
  <a href="index.html" class="back-link">← 返回 SwCTools 主站</a>
</div>

<script>
  (function(){
    "use strict";

    // 深色模式
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';
    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('swc_theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '深色' : '亮色';
    });

    // 帧率显示
    const fpsDisplay = document.getElementById('fpsDisplay');
    let frameCount = 0, lastFpsUpdate = performance.now();
    function updateFPS() {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsUpdate >= 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0;
        lastFpsUpdate = now;
      }
      requestAnimationFrame(updateFPS);
    }
    requestAnimationFrame(updateFPS);

    // DOM 元素
    const coresDisplay = document.getElementById('coresDisplay');
    const threadSlider = document.getElementById('threadSlider');
    const threadValue = document.getElementById('threadValue');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    const timerDisplay = document.getElementById('timerDisplay');
    const activeWorkersSpan = document.getElementById('activeWorkers');
    const computeSpeedSpan = document.getElementById('computeSpeed');
    const coreHint = document.getElementById('coreHint');

    let workers = [];
    let isRunning = false;
    let startTime = null;
    let timerInterval = null;
    let hardwareCores = navigator.hardwareConcurrency || 4;
    
    // 操作数累加器
    let accumulatedOps = 0;
    let speedInterval = null;
    let activeWorkerCount = 0;
    
    const MAX_THREADS = 32;
    threadSlider.max = MAX_THREADS;
    const defaultThreads = Math.min(hardwareCores, MAX_THREADS);
    threadSlider.value = defaultThreads;
    threadValue.textContent = defaultThreads;
    coresDisplay.textContent = `${hardwareCores} 核心`;
    coreHint.textContent = hardwareCores;

    threadSlider.addEventListener('input', () => threadValue.textContent = threadSlider.value);

    function formatElapsed(seconds) {
      if (seconds < 0) seconds = 0;
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      return hrs > 0 ? `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` : `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function updateTimerDisplay() {
      if (startTime && isRunning) timerDisplay.textContent = formatElapsed((Date.now() - startTime) / 1000);
      else timerDisplay.textContent = '00:00';
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      startTime = Date.now();
      updateTimerDisplay();
      timerInterval = setInterval(updateTimerDisplay, 200);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      startTime = null;
      timerDisplay.textContent = '00:00';
    }

    // 更新计算速度显示 (每秒调用)
    function updateSpeedDisplay() {
      const opsThisSecond = accumulatedOps;
      accumulatedOps = 0;
      
      if (opsThisSecond > 0) {
        computeSpeedSpan.textContent = opsThisSecond > 1e9 ? `${(opsThisSecond/1e9).toFixed(2)} G ops` :
                                        (opsThisSecond > 1e6 ? `${(opsThisSecond/1e6).toFixed(2)} M ops` :
                                        `${opsThisSecond} ops`);
      }
    }

    function startSpeedMonitor() {
      accumulatedOps = 0;
      if (speedInterval) clearInterval(speedInterval);
      speedInterval = setInterval(updateSpeedDisplay, 1000);
    }

    function stopSpeedMonitor() {
      if (speedInterval) { clearInterval(speedInterval); speedInterval = null; }
      accumulatedOps = 0;
      computeSpeedSpan.textContent = '0 ops';
    }

    function setUIForRunning(running) {
      isRunning = running;
      if (running) {
        statusText.innerHTML = '满载中';
        startBtn.disabled = true;
        stopBtn.disabled = false;
        threadSlider.disabled = true;
        startSpeedMonitor();
      } else {
        statusText.innerHTML = '空闲';
        startBtn.disabled = false;
        stopBtn.disabled = true;
        threadSlider.disabled = false;
        activeWorkersSpan.textContent = '0';
        stopSpeedMonitor();
      }
    }

    function terminateAllWorkers() {
      workers.forEach(w => { try { w.terminate(); } catch(e) {} });
      workers = [];
      activeWorkersSpan.textContent = '0';
      activeWorkerCount = 0;
    }

    function fullStop() {
      if (!isRunning && workers.length === 0) { setUIForRunning(false); stopTimer(); return; }
      terminateAllWorkers();
      stopTimer();
      setUIForRunning(false);
    }

    // 创建 Worker（增强版：汇报阈值400，计算强度进一步提升）
    function createWorker() {
      const workerScript = `
        let iteration = 0;
        // 扩大数组尺寸，增加缓存压力
        const size = 4096;
        let arr1 = new Float64Array(size);
        let arr2 = new Float64Array(size);
        let arr3 = new Float64Array(size);
        let arr4 = new Float64Array(size);
        for (let i = 0; i < size; i++) {
          arr1[i] = Math.random() * 1000.0;
          arr2[i] = Math.random() * 1000.0;
          arr4[i] = Math.random() * 1000.0;
        }
        
        function intenseLoop() {
          let dot = 0.0;
          // 点积增加维度
          for (let i = 0; i < size; i++) {
            dot += arr1[i] * arr2[i] + arr4[i] * 0.5;
          }
          let trigSum = 0.0;
          // 三角函数迭代次数翻倍
          for (let i = 0; i < 16000; i++) {
            trigSum += Math.sin(i * 0.017) * Math.cos(i * 0.013) + Math.tan(i * 0.007);
            trigSum += Math.exp(Math.log(Math.abs(trigSum) + 1.0)) * 0.001;
          }
          for (let i = 0; i < size; i++) {
            arr3[i] = arr1[i] * 1.5 + arr2[i] * 0.7 + arr4[i] * 0.3 + dot * 0.0001 + trigSum * 0.000001;
          }
          let intSum = 0;
          // 整数位运算循环增加
          for (let i = 0; i < 40000; i++) {
            intSum += (i * 7919) ^ (i << 2);
            intSum = intSum >>> 0;
          }
          // 增加乘加操作，使流水线更满
          arr1[0] = (arr1[0] + dot * 1e-9 + trigSum * 1e-12 + intSum * 1e-9) % 1000.0;
          arr2[0] = (arr2[0] + arr3[0] * 0.0001 + arr4[0] * 0.0001) % 1000.0;
          arr4[0] = (arr4[0] + arr1[0] * 0.0001) % 1000.0;
          return dot + trigSum + intSum;
        }

        // 持续计算，每完成 400 次循环汇报一次（汇报阈值提高到400）
        while (true) {
          intenseLoop();
          iteration++;
          if (iteration >= 400) {
            self.postMessage({ ops: iteration });
            iteration = 0;
          }
          // 边界检查
          if (arr1[0] > 1e9) arr1[0] = Math.random() * 1000;
          if (arr2[0] > 1e9) arr2[0] = Math.random() * 1000;
          if (arr4[0] > 1e9) arr4[0] = Math.random() * 1000;
        }
      `;
      
      const blob = new Blob([workerScript], { type: 'application/javascript' });
      const workerUrl = URL.createObjectURL(blob);
      const worker = new Worker(workerUrl);
      
      worker.onmessage = (e) => {
        if (e.data && typeof e.data.ops === 'number') {
          accumulatedOps += e.data.ops;
        }
      };
      
      worker.onerror = (e) => {
        console.warn('Worker error', e);
        const idx = workers.indexOf(worker);
        if (idx > -1) workers.splice(idx, 1);
        activeWorkersSpan.textContent = workers.length;
        activeWorkerCount = workers.length;
      };
      
      URL.revokeObjectURL(workerUrl);
      return worker;
    }

    function startBurn() {
      fullStop();
      let threadCount = parseInt(threadSlider.value, 10);
      if (isNaN(threadCount) || threadCount < 1) threadCount = 1;
      
      setUIForRunning(true);
      activeWorkerCount = threadCount;
      
      for (let i = 0; i < threadCount; i++) {
        try {
          workers.push(createWorker());
        } catch (e) {
          console.error('创建Worker失败', e);
        }
      }
      
      activeWorkersSpan.textContent = workers.length;
      startTimer();
      
      if (workers.length === 0) {
        fullStop();
        alert('无法创建工作线程，请刷新重试。');
      }
    }

    startBtn.addEventListener('click', startBurn);
    stopBtn.addEventListener('click', fullStop);
    window.addEventListener('beforeunload', () => workers.forEach(w => { try { w.terminate(); } catch(e) {} }));

    threadValue.textContent = threadSlider.value;
  })();
</script>
</body>
</html>
