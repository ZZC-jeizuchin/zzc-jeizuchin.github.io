<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="baiduspider" content="noindex, nofollow">
  <meta name="yandex" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">
  <title>SwCTools</title>
  <style>
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.85);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --badge-bg: #d0e2f0;
      --badge-color: #2c6182;
      --cat-btn-bg: #d9e8f4;
      --cat-btn-border: #adc7e0;
      --cat-btn-color: #1a4059;
      --cat-btn-hover-bg: #c2d8ed;
      --jump-row-bg: #e7f0f9;
      --jump-row-border: #c1d6ea;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
      --go-btn-bg: #4f7f9e;
      --go-btn-hover-bg: #3a6b8c;
      --tool-btn-bg: #cddef0;
      --tool-btn-border: #a3bed8;
      --tool-btn-color: #1a4765;
      --modal-overlay-bg: rgba(22, 50, 70, 0.25);
      --modal-card-bg: #f3f9ff;
      --link-item-bg: #d9e8f4;
      --link-item-border: #adc7e0;
      --drawer-panel-bg: #f3f9ff;
      --device-item-bg: #eaf2fc;
      --device-label-color: #1e4b6e;
      --device-value-color: #0d3450;
      --text-color: #173e58;
      --corner-text-color: #3a6a8e;
      --fps-bg: rgba(255, 255, 255, 0.6);
    }

    [data-theme="dark"] {
      --bg-body: #0a0f14;
      --panel-bg: rgba(13, 27, 42, 0.9);
      --panel-border: #1e3a5a;
      --title-color: #a0c4e8;
      --badge-bg: #1a3a5c;
      --badge-color: #b0d0f0;
      --cat-btn-bg: #1e3a5a;
      --cat-btn-border: #2a5a8a;
      --cat-btn-color: #c0d8f0;
      --cat-btn-hover-bg: #2a5a8a;
      --jump-row-bg: #122a3e;
      --jump-row-border: #1e4a6e;
      --input-border: #2a5a8a;
      --input-focus-border: #5a9ac0;
      --go-btn-bg: #2a6a9e;
      --go-btn-hover-bg: #1a4a7a;
      --tool-btn-bg: #1e3a5a;
      --tool-btn-border: #2a5a8a;
      --tool-btn-color: #c0d8f0;
      --modal-overlay-bg: rgba(0, 20, 40, 0.5);
      --modal-card-bg: #0d1b2a;
      --link-item-bg: #1e3a5a;
      --link-item-border: #2a5a8a;
      --drawer-panel-bg: #0d1b2a;
      --device-item-bg: #122a3e;
      --device-label-color: #a0c4e8;
      --device-value-color: #d0e0f0;
      --text-color: #c0d8f0;
      --corner-text-color: #7a9ab0;
      --fps-bg: rgba(0, 0, 0, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: var(--bg-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; position: relative; }

    .corner-tl { position: fixed; top: 12px; left: 16px; font-size: 0.75rem; color: var(--corner-text-color); opacity: 0.8; z-index: 3000; pointer-events: none; }
    .corner-tr { position: fixed; top: 12px; right: 20px; font-size: 0.75rem; color: var(--corner-text-color); opacity: 0.8; z-index: 3000; pointer-events: none; background: var(--fps-bg); padding: 4px 12px; border-radius: 24px; border: 1px solid var(--panel-border); }
    .corner-br { position: fixed; bottom: 12px; right: 20px; font-size: 0.75rem; color: var(--corner-text-color); opacity: 0.8; z-index: 3000; pointer-events: none; }

    .theme-toggle, .perf-toggle {
      position: fixed;
      bottom: 12px;
      font-size: 0.9rem;
      background: var(--cat-btn-bg);
      border: 1px solid var(--panel-border);
      color: var(--corner-text-color);
      padding: 5px 14px;
      border-radius: 32px;
      cursor: pointer;
      opacity: 0.85;
      transition: 0.2s;
      z-index: 3000;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-toggle { left: 16px; }
    .perf-toggle { left: 100px; }
    .theme-toggle:hover, .perf-toggle:hover { opacity: 1; background: var(--cat-btn-hover-bg); }

    .main-panel { max-width: 1280px; width: 100%; background: var(--panel-bg); border-radius: 28px; box-shadow: 0 16px 30px -8px rgba(30, 65, 90, 0.18); border: 1px solid var(--panel-border); padding: 20px 24px 24px; position: relative; }
    .title-section { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--panel-border); }
    .title-section h1 { font-weight: 550; font-size: 2rem; color: var(--title-color); }
    .badge { color: var(--badge-color); background: var(--badge-bg); padding: 6px 16px; border-radius: 40px; font-size: 0.9rem; border: 1px solid var(--cat-btn-border); }

    .category-bar { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0 18px; }
    .cat-btn {
      background: var(--cat-btn-bg); border: 1px solid var(--cat-btn-border); color: var(--cat-btn-color);
      padding: 12px 22px; border-radius: 40px; font-weight: 520; font-size: 1rem;
      box-shadow: 0 3px 6px rgba(50, 85, 110, 0.05); cursor: pointer; transition: all 0.15s ease;
      flex: 0 1 auto; -webkit-tap-highlight-color: transparent;
    }
    .cat-btn:hover { background: var(--cat-btn-hover-bg); border-color: #7fa5c5; }

    .jump-section { margin: 8px 0 12px; }
    .jump-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; background: var(--jump-row-bg); padding: 10px 18px; border-radius: 60px; margin-bottom: 12px; border: 1px solid var(--jump-row-border); }
    .jump-row input, .jump-row select { flex: 4 1 180px; padding: 14px 18px; border: 1.5px solid var(--input-border); border-radius: 48px; background: var(--panel-bg); font-size: 0.95rem; outline: none; color: var(--text-color); }
    .jump-row select { flex: 1 1 130px; cursor: pointer; }
    .jump-row input:focus, .jump-row select:focus { border-color: var(--input-focus-border); box-shadow: 0 0 0 3px rgba(79,127,163,0.2); }
    .go-btn {
      background: var(--go-btn-bg); border: none; color: white; padding: 14px 28px;
      border-radius: 48px; font-weight: 600; font-size: 1rem; cursor: pointer;
      white-space: nowrap; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .go-btn:hover { background: var(--go-btn-hover-bg); }

    .tools-bar { display: flex; gap: 12px; margin: 14px 0 8px; }
    .tool-btn {
      background: var(--tool-btn-bg); border: 1px solid var(--tool-btn-border); color: var(--tool-btn-color);
      padding: 14px 20px; border-radius: 56px; font-weight: 550; font-size: 1.05rem;
      cursor: pointer; flex: 1 1 0; text-align: center; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-btn:hover { background: #bcd1e9; border-color: #7b9fc2; }

    /* 模态框与滑动容器 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay-bg); backdrop-filter: blur(3px); visibility: hidden; opacity: 0; transition: opacity 0.2s, visibility 0.2s; z-index: 2000; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .modal-overlay.show { visibility: visible; opacity: 1; }
    .modal-swiper { width: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    .modal-slides { display: flex; transition: transform 0.2s ease-out; will-change: transform; -webkit-tap-highlight-color: transparent; }
    .modal-card { background: var(--modal-card-bg); width: 90vw; max-width: 700px; max-height: 70vh; border-radius: 32px; border: 1px solid var(--panel-border); box-shadow: 0 20px 40px rgba(28, 60, 84, 0.25); padding: 24px 28px; overflow-y: auto; flex-shrink: 0; margin: 0 5vw; position: relative; -webkit-tap-highlight-color: transparent; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px; }
    .modal-header h3 { color: var(--title-color); font-size: 1.7rem; }
    .modal-close { background: none; border: none; font-size: 32px; cursor: pointer; color: var(--corner-text-color); line-height: 1; -webkit-tap-highlight-color: transparent; }
    .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .link-item { background: var(--link-item-bg); border: 1px solid var(--link-item-border); color: var(--cat-btn-color); padding: 14px 8px; border-radius: 40px; text-align: center; text-decoration: none; font-weight: 520; transition: all 0.15s; display: block; -webkit-tap-highlight-color: transparent; }
    .link-item:hover { background: var(--cat-btn-hover-bg); border-color: #7fa5c5; }

    /* 底部抽屉滑动容器 */
    .drawer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay-bg); backdrop-filter: blur(3px); visibility: hidden; opacity: 0; transition: opacity 0.2s, visibility 0.2s; z-index: 2000; display: flex; align-items: flex-end; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .drawer-overlay.show { visibility: visible; opacity: 1; }
    .drawer-swiper { width: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    .drawer-slides { display: flex; transition: transform 0.2s ease-out; will-change: transform; -webkit-tap-highlight-color: transparent; }
    .drawer-panel { background: var(--drawer-panel-bg); width: 100vw; border-radius: 32px 32px 0 0; border: 1px solid var(--panel-border); height: 80vh; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .drawer-header { padding: 22px 28px 14px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--panel-border); }
    .drawer-close-btn { background: none; border: none; font-size: 36px; cursor: pointer; color: var(--corner-text-color); line-height: 1; -webkit-tap-highlight-color: transparent; }
    .drawer-content { padding: 24px 28px; overflow-y: auto; flex: 1; color: var(--text-color); -webkit-tap-highlight-color: transparent; }

    .device-grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; pointer-events: none; }
    .device-item { background: var(--device-item-bg); border-radius: 24px; padding: 18px 20px; border: 1px solid var(--panel-border); pointer-events: none; }
    .device-label { font-weight: 600; color: var(--device-label-color); margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; pointer-events: none; }
    .device-value { color: var(--device-value-color); word-break: break-word; pointer-events: none; }
    .drawer-footer-link { margin-top: 24px; text-align: center; pointer-events: auto; }

    .ide-container { display: flex; flex-direction: column; gap: 20px; }
    .ide-editor { background: var(--panel-bg); border-radius: 28px; border: 2px solid var(--input-border); overflow: hidden; }
    .ide-textarea { width: 100%; padding: 24px; font-family: 'JetBrains Mono', monospace; font-size: 15px; background: transparent; border: none; outline: none; color: var(--text-color); resize: vertical; min-height: 240px; }
    .ide-preview { background: white; border-radius: 24px; border: 2px solid var(--input-border); padding: 20px; }
    .ide-preview iframe { width: 100%; height: 280px; border: none; background: white; border-radius: 16px; }
    .ide-action-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .run-ide-btn { background: var(--go-btn-bg); color: white; border: none; padding: 14px 28px; border-radius: 56px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .nav-btn {
      background: var(--tool-btn-bg);
      border: 1px solid var(--tool-btn-border);
      color: var(--tool-btn-color);
      padding: 16px 20px;
      border-radius: 48px;
      text-align: center;
      font-weight: 550;
      font-size: 1.1rem;
      transition: all 0.15s;
      cursor: pointer;
      display: block;
      width: 100%;
      margin-bottom: 16px;
      appearance: none;
      -webkit-appearance: none;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
    }
    .nav-btn:last-child { margin-bottom: 0; }
    .nav-btn:hover { background: var(--cat-btn-hover-bg); border-color: #7b9fc2; }

    .loading-placeholder { display: flex; align-items: center; justify-content: center; padding: 40px; pointer-events: none; }
    .loading-spinner { width: 28px; height: 28px; border: 3px solid rgba(79, 127, 158, 0.2); border-top-color: #4f7f9e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 性能模式：完全禁用动效与阴影，降低渲染开销 */
    .perf-mode .cat-btn,
    .perf-mode .go-btn,
    .perf-mode .tool-btn,
    .perf-mode .nav-btn,
    .perf-mode .link-item,
    .perf-mode .run-ide-btn,
    .perf-mode .theme-toggle,
    .perf-mode .perf-toggle,
    .perf-mode button {
      transition: none !important;
      transform: none !important;
      box-shadow: none !important;
    }
    .perf-mode .cat-btn:hover,
    .perf-mode .go-btn:hover,
    .perf-mode .tool-btn:hover,
    .perf-mode .nav-btn:hover,
    .perf-mode .link-item:hover,
    .perf-mode .run-ide-btn:hover,
    .perf-mode .theme-toggle:hover,
    .perf-mode .perf-toggle:hover {
      background: var(--cat-btn-hover-bg);
      border-color: #7fa5c5;
    }
    .perf-mode .modal-slides,
    .perf-mode .drawer-slides {
      transition: none !important;
      will-change: auto !important;
    }
    .perf-mode .modal-overlay,
    .perf-mode .drawer-overlay {
      transition: none !important;
    }
    .perf-mode .main-panel {
      box-shadow: none !important;
    }

    /* Base64 表格紧凑样式 */
    .base64-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 0.8rem;
      margin-top: 20px;
      table-layout: fixed;
    }
    .base64-table th, .base64-table td {
      border: 1px solid var(--panel-border);
      padding: 3px 4px;
      text-align: center;
      word-break: break-all;
    }
    .base64-table th {
      background: var(--jump-row-bg);
      font-weight: 600;
      color: var(--title-color);
    }
    .base64-table .char-cell {
      font-weight: 500;
    }

    @media (max-width: 600px) {
      .device-grid-2x2 { grid-template-columns: 1fr; }
      .main-panel { padding: 16px 16px 20px; }
      .base64-table { font-size: 0.7rem; }
      .base64-table th, .base64-table td { padding: 2px 2px; }
    }
    @media (max-width: 480px) {
      .category-bar { justify-content: center; }
      .jump-row .go-btn { width: 100%; }
    }
  </style>
</head>
<body>
<div class="corner-tl">不自由毋宁死 · 不自由毋寧死 · Give me liberty or give me death · 自由か、死か</div>
<div class="corner-tr" id="fpsDisplay">FPS: --</div>
<div class="corner-br">made by ZZC-jeizuchin, github</div>
<button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">深色</button>
<button class="perf-toggle" id="perfToggle" aria-label="性能模式">性能</button>

<div class="main-panel">
  <div class="title-section"><h1>Seewo Crack Tools</h1><span class="badge">自由工具箱</span></div>
  <div class="category-bar">
    <button class="cat-btn" data-cat="ai">AI工具</button>
    <button class="cat-btn" data-cat="search">搜索引擎</button>
    <button class="cat-btn" data-cat="media">通信音乐</button>
    <button class="cat-btn" data-cat="dev">开发</button>
    <button class="cat-btn" data-cat="other">其他</button>
  </div>
  <div class="jump-section">
    <div class="jump-row"><input type="text" id="customUrlInput" placeholder="输入网址，回车或点击跳转"><button class="go-btn" id="jumpBtn">前往</button></div>
    <div class="jump-row"><input type="text" id="baiduImageInput" placeholder="百度图片搜索关键词" autocomplete="off"><button class="go-btn" id="baiduImageBtn">搜图</button></div>
    <div class="jump-row">
      <select id="searchEngineSelect"><option value="baidu">百度</option><option value="google">Google</option><option value="yandex">Yandex</option><option value="bing">Bing</option><option value="duckduckgo">DuckDuckGo</option></select>
      <input type="text" id="searchKeywordInput" placeholder="输入搜索关键词" autocomplete="off"><button class="go-btn" id="searchEngineBtn">搜索</button>
    </div>
  </div>
  <div class="tools-bar">
    <button class="tool-btn" id="showDeviceInfoBtn">设备信息</button>
    <button class="tool-btn" id="showIdeBtn">HTML IDE</button>
    <button class="tool-btn" id="showStressBtn">压力测试</button>
    <button class="tool-btn" id="showBase64Btn">Base64编译</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-swiper">
    <div class="modal-slides" id="modalSlides"></div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer-swiper">
    <div class="drawer-slides" id="drawerSlides"></div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // 深色模式
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '深色' : '亮色';
    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('swc_theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '深色' : '亮色';
    });

    // 性能模式
    const perfToggle = document.getElementById('perfToggle');
    const perfMode = localStorage.getItem('swc_perf') === 'true';
    if (perfMode) document.body.classList.add('perf-mode');
    perfToggle.textContent = perfMode ? '性能 ✓' : '性能';
    perfToggle.addEventListener('click', () => {
      const enabled = document.body.classList.toggle('perf-mode');
      localStorage.setItem('swc_perf', enabled);
      perfToggle.textContent = enabled ? '性能 ✓' : '性能';
    });

    // 帧率显示 (支持后台暂停)
    const fpsDisplay = document.getElementById('fpsDisplay');
    let frameCount = 0, lastFpsUpdate = performance.now();
    let rafId = null;
    function fpsLoop() {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsUpdate >= 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0;
        lastFpsUpdate = now;
      }
      rafId = requestAnimationFrame(fpsLoop);
    }
    function startFPS() { if (!rafId) rafId = requestAnimationFrame(fpsLoop); }
    function stopFPS() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopFPS(); else startFPS();
    });
    startFPS();

    // 链接库
    const linkDB = {
      ai: [{ name: 'DeepSeek', url: 'https://chat.deepseek.com' },{ name: 'Doubao', url: 'https://www.doubao.com' },{ name: 'Qwen (通义千问)', url: 'https://qianwen.aliyun.com' },{ name: 'Kimi', url: 'https://kimi.moonshot.cn' }],
      search: [{ name: 'Google', url: 'https://www.google.com' },{ name: 'Bing (国内)', url: 'https://cn.bing.com' },{ name: 'Bing (国际)', url: 'https://www.bing.com' },{ name: 'MSN', url: 'https://www.msn.com' },{ name: 'DuckDuckGo', url: 'https://duckduckgo.com' },{ name: 'Baidu', url: 'https://baidu.com' },{ name: 'Yandex', url: 'https://yandex.com' },{ name: 'Yandex RU', url: 'https://yandex.ru' },{ name: 'Bilibili', url: 'https://bilibili.com' }],
      media: [{ name: '自由公园', url: 'https://ziyoupark.com' },{ name: 'XCloud Music', url: 'https://music.xcloudv.top' },{ name: 'PJMP3', url: 'https://pjmp3.com' },{ name: 'PeanutDL', url: 'https://peanutdl.com' },{ name: 'WyAPI', url: 'https://wyapi.toubiec.cn' },{ name: 'GDStudio Music', url: 'https://music.gdstudio.org' }],
      dev: [{ name: 'GitHub', url: 'https://github.com' },{ name: 'IP.SB', url: 'https://www.ip.sb' },{ name: 'Intel', url: 'https://www.intel.com' },{ name: 'AMD', url: 'https://www.amd.com' },{ name: 'NVIDIA', url: 'https://www.nvidia.com' },{ name: 'Lenovo', url: 'https://www.lenovo.com' },{ name: 'Huawei', url: 'https://www.huawei.com' },{ name: 'Apple', url: 'https://www.apple.com' },{ name: 'Microsoft', url: 'https://www.microsoft.com' },{ name: 'cpp.sh', url: 'https://cpp.sh' },{ name: 'Python (官网)', url: 'https://www.python.org' },{ name: 'Python IDE', url: 'https://www.programiz.com/python-programming/online-compiler/' },{ name: 'Cloudflare', url: 'https://www.cloudflare.com' }],
      other: [{ name: 'MMPan.top', url: 'https://mmpan.top' },{ name: 'CNN Edition', url: 'https://edition.cnn.com' },{ name: 'Poki', url: 'https://poki.com' },{ name: 'Steam', url: 'https://store.steampowered.com' },{ name: 'Slow Roads', url: 'https://slowroads.io' }]
    };
    const catNames = { ai:'AI工具', search:'搜索引擎', media:'通信音乐', dev:'开发', other:'其他' };
    const categories = ['ai', 'search', 'media', 'dev', 'other'];
    const drawerTypes = ['device', 'ide', 'stress', 'base64'];

    // 通用跳转（修改协议判断逻辑：只要包含 :// 就不再补 https://）
    function performJump(url, addTimestamp = true) {
      if (!url) return;
      let final = url;
      if (!final.includes('://')) {
        final = 'https://' + final;
      }
      if (addTimestamp) {
        final += (final.includes('?') ? '&' : '?') + '_t=' + Date.now();
      }
      window.location.href = final;
    }

    // 历史记录
    function getHistory(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } }
    function addHistory(key, value) { if(!value.trim()) return; let hist = getHistory(key); hist = hist.filter(v => v !== value); hist.unshift(value); if(hist.length > 4) hist.pop(); localStorage.setItem(key, JSON.stringify(hist)); }
    function setupHistoryInput(inputEl, storageKey) {
      const datalistId = `dl_${storageKey}`; let dl = document.getElementById(datalistId);
      if(!dl) { dl = document.createElement('datalist'); dl.id = datalistId; inputEl.setAttribute('list', datalistId); inputEl.parentNode?.appendChild(dl); }
      inputEl.addEventListener('focus', () => { const hist = getHistory(storageKey); dl.innerHTML = hist.map(v => `<option value="${v}">`).join(''); });
      return { add: (v) => { addHistory(storageKey, v); } };
    }

    const imgInput = document.getElementById('baiduImageInput'), engineInput = document.getElementById('searchKeywordInput');
    const imgHistory = setupHistoryInput(imgInput, 'baidu_img_hist'), engineHistory = setupHistoryInput(engineInput, 'engine_hist');
    document.getElementById('jumpBtn').addEventListener('click', ()=> { const raw = document.getElementById('customUrlInput').value.trim(); if(raw) performJump(raw, false); });
    document.getElementById('customUrlInput').addEventListener('keydown', e=> { if(e.key==='Enter') document.getElementById('jumpBtn').click(); });
    document.getElementById('baiduImageBtn').addEventListener('click', ()=> { const kw = imgInput.value.trim(); if(kw) { imgHistory.add(kw); performJump('https://image.baidu.com/search/index?tn=baiduimage&ie=utf-8&word='+encodeURIComponent(kw), false); } });
    imgInput.addEventListener('keydown', e=> { if(e.key==='Enter') document.getElementById('baiduImageBtn').click(); });
    document.getElementById('searchEngineBtn').addEventListener('click', ()=>{
      const engine = document.getElementById('searchEngineSelect').value, query = engineInput.value.trim(); if(!query) return;
      engineHistory.add(query);
      const engines = { baidu: `https://www.baidu.com/s?wd=${encodeURIComponent(query)}`, google: `https://www.google.com/search?q=${encodeURIComponent(query)}`, yandex: `https://yandex.com/search/?text=${encodeURIComponent(query)}`, bing: `https://www.bing.com/search?q=${encodeURIComponent(query)}`, duckduckgo: `https://duckduckgo.com/?q=${encodeURIComponent(query)}` };
      performJump(engines[engine] || engines.baidu, true);
    });
    engineInput.addEventListener('keydown', e=> { if(e.key==='Enter') document.getElementById('searchEngineBtn').click(); });

    // 模态框滑动系统 (优化: 缓存宽度避免 touchmove 中重复布局计算)
    const modalOverlay = document.getElementById('modalOverlay'), modalSlides = document.getElementById('modalSlides');
    let currentCatIndex = 0, modalStartX = 0, modalCurrentX = 0, isModalDragging = false;
    let cachedModalSlideWidth = 0;
    function buildModalSlides() {
      modalSlides.innerHTML = categories.map(cat => `
        <div class="modal-card" data-cat="${cat}">
          <div class="modal-header">
            <h3>${catNames[cat]}</h3>
            <button class="modal-close" data-close-modal>&times;</button>
          </div>
          <div class="link-grid">${linkDB[cat].map(l => `<a class="link-item" href="${l.url}" target="_blank" rel="noopener">${l.name}</a>`).join('')}</div>
        </div>
      `).join('');
      modalSlides.querySelectorAll('[data-close-modal]').forEach(btn => btn.addEventListener('click', ()=> modalOverlay.classList.remove('show')));
    }
    function updateModalSlidePosition(offset) { modalSlides.style.transform = `translateX(${offset}px)`; }
    function snapModalToIndex(index) {
      modalSlides.style.transition = ''; // 清除内联过渡，交由 CSS 控制
      const offset = -index * cachedModalSlideWidth;
      updateModalSlidePosition(offset);
      currentCatIndex = index;
    }
    modalOverlay.addEventListener('touchstart', (e) => {
      modalStartX = e.touches[0].clientX; modalCurrentX = modalStartX; isModalDragging = true;
      modalSlides.style.transition = 'none';
    });
    modalOverlay.addEventListener('touchmove', (e) => {
      if(!isModalDragging || cachedModalSlideWidth === 0) return;
      const delta = e.touches[0].clientX - modalStartX;
      const baseOffset = -currentCatIndex * cachedModalSlideWidth;
      updateModalSlidePosition(baseOffset + delta);
      modalCurrentX = e.touches[0].clientX;
    });
    modalOverlay.addEventListener('touchend', () => {
      if(!isModalDragging) return; isModalDragging = false;
      const delta = modalCurrentX - modalStartX; const threshold = 60;
      let newIndex = currentCatIndex;
      if (delta < -threshold && currentCatIndex < categories.length - 1) newIndex = currentCatIndex + 1;
      else if (delta > threshold && currentCatIndex > 0) newIndex = currentCatIndex - 1;
      snapModalToIndex(newIndex);
    });
    function openModalAt(index) {
      if(!modalSlides.children.length) buildModalSlides();
      const card = modalSlides.children[0];
      if (card && cachedModalSlideWidth === 0) {
        const margin = parseFloat(getComputedStyle(card).marginLeft) || window.innerWidth * 0.05;
        cachedModalSlideWidth = card.offsetWidth + margin * 2;
      }
      currentCatIndex = index;
      modalSlides.style.transition = 'none';
      updateModalSlidePosition(-index * cachedModalSlideWidth);
      modalSlides.offsetHeight;
      modalSlides.style.transition = '';
      modalOverlay.classList.add('show');
    }
    modalOverlay.addEventListener('click', e=> { if(e.target === modalOverlay) modalOverlay.classList.remove('show'); });
    document.querySelectorAll('[data-cat]').forEach((btn, idx) => btn.addEventListener('click', ()=> openModalAt(idx)));

    // 底部抽屉滑动系统 (同样优化宽度缓存)
    const drawerOverlay = document.getElementById('drawerOverlay'), drawerSlides = document.getElementById('drawerSlides');
    let currentDrawerIndex = 0, drawerStartX = 0, drawerCurrentX = 0, isDrawerDragging = false;
    let cachedDrawerPanelWidth = 0;
    const drawerTitles = { device: '设备信息', ide: 'HTML IDE', stress: '压力测试', base64: 'Base64编译' };
    const drawerRendered = { device: false, ide: false, stress: false, base64: false };
    
    function bindDrawerCloseButtons() {
      if (!drawerSlides) return;
      drawerSlides.querySelectorAll('[data-close-drawer]').forEach(btn => {
        btn.onclick = () => { drawerOverlay.classList.remove('show'); document.body.style.overflow = ''; };
      });
    }

    function buildDrawerSlides() {
      drawerSlides.innerHTML = drawerTypes.map(type => `
        <div class="drawer-panel" data-drawer="${type}">
          <div class="drawer-header"><h3>${drawerTitles[type]}</h3><button class="drawer-close-btn" data-close-drawer>&times;</button></div>
          <div class="drawer-content" id="drawer-${type}"></div>
        </div>
      `).join('');
      bindDrawerCloseButtons();
    }
    
    function updateDrawerSlidePosition(offset) { drawerSlides.style.transform = `translateX(${offset}px)`; }
    function snapDrawerToIndex(index) {
      drawerSlides.style.transition = ''; 
      const offset = -index * cachedDrawerPanelWidth;
      updateDrawerSlidePosition(offset);
      currentDrawerIndex = index;
      const type = drawerTypes[index];
      if(!drawerRendered[type]) {
        if(type === 'device') renderDevice();
        else if(type === 'ide') renderIDE();
        else if(type === 'stress') renderStress();
        else if(type === 'base64') renderBase64();
        drawerRendered[type] = true;
      }
    }
    drawerOverlay.addEventListener('touchstart', (e) => { drawerStartX = e.touches[0].clientX; drawerCurrentX = drawerStartX; isDrawerDragging = true; drawerSlides.style.transition = 'none'; });
    drawerOverlay.addEventListener('touchmove', (e) => { if(!isDrawerDragging || cachedDrawerPanelWidth === 0) return; const delta = e.touches[0].clientX - drawerStartX; const baseOffset = -currentDrawerIndex * cachedDrawerPanelWidth; updateDrawerSlidePosition(baseOffset + delta); drawerCurrentX = e.touches[0].clientX; });
    drawerOverlay.addEventListener('touchend', () => { if(!isDrawerDragging) return; isDrawerDragging = false; const delta = drawerCurrentX - drawerStartX; const threshold = 60; let newIndex = currentDrawerIndex; if (delta < -threshold && currentDrawerIndex < drawerTypes.length - 1) newIndex = currentDrawerIndex + 1; else if (delta > threshold && currentDrawerIndex > 0) newIndex = currentDrawerIndex - 1; snapDrawerToIndex(newIndex); });
    
    function openDrawerAt(index) {
      if(!drawerSlides.children.length) buildDrawerSlides();
      const panel = drawerSlides.children[0];
      if (panel && cachedDrawerPanelWidth === 0) {
        cachedDrawerPanelWidth = panel.offsetWidth;
      }
      currentDrawerIndex = index;
      drawerSlides.style.transition = 'none';
      updateDrawerSlidePosition(-index * cachedDrawerPanelWidth);
      drawerSlides.offsetHeight;
      drawerSlides.style.transition = '';
      drawerOverlay.classList.add('show');
      document.body.style.overflow = 'hidden';
      const type = drawerTypes[index];
      if(!drawerRendered[type]) {
        if(type === 'device') renderDevice();
        else if(type === 'ide') renderIDE();
        else if(type === 'stress') renderStress();
        else if(type === 'base64') renderBase64();
        drawerRendered[type] = true;
      }
    }
    drawerOverlay.addEventListener('click', (e) => { if(e.target === drawerOverlay) { drawerOverlay.classList.remove('show'); document.body.style.overflow = ''; } });
    
    document.getElementById('showDeviceInfoBtn').addEventListener('click', ()=> openDrawerAt(0));
    document.getElementById('showIdeBtn').addEventListener('click', ()=> openDrawerAt(1));
    document.getElementById('showStressBtn').addEventListener('click', ()=> openDrawerAt(2));
    document.getElementById('showBase64Btn').addEventListener('click', ()=> openDrawerAt(3));

    // 压力测试抽屉
    function renderStress() {
      const container = document.getElementById('drawer-stress');
      container.innerHTML = `
        <button class="nav-btn" onclick="location.href='cpustress.html'">CPU 压力测试</button>
        <button class="nav-btn" onclick="location.href='gpustress.html'">GPU 压力测试</button>
        <button class="nav-btn" onclick="location.href='stress.html'">三烤 (CPU + GPU + RAM)</button>
        <button class="nav-btn" onclick="location.href='memorystress.html'">内存压力测试</button>
      `;
    }

    // 设备信息渲染
    async function getRealPlatform() { return navigator.platform; }
    async function getBatteryInfo() { if(!navigator.getBattery) return '不支持'; const b = await navigator.getBattery(); return `${Math.round(b.level*100)}% ${b.charging ? '充电中' : '使用中'}`; }
    function getGPUInfo() { try { const canvas = document.createElement('canvas'); const gl = canvas.getContext('webgl')||canvas.getContext('experimental-webgl'); if(!gl) return 'WebGL不支持'; const ext = gl.getExtension('WEBGL_debug_renderer_info'); if(!ext) return '扩展不可用'; return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)||'未知'; } catch { return '获取失败'; } }
    async function getIPInfo() { let local='获取中...', pub='获取中...'; try { const pc = new RTCPeerConnection(); pc.createDataChannel(''); await pc.setLocalDescription(await pc.createOffer()); local = await new Promise(r=>{ pc.onicecandidate=e=>{ if(e.candidate){ let m=e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/); if(m) r(m[0]); } else r('未检测到'); }; setTimeout(()=>r('超时'),2000); }); } catch { local='不可用'; } try { const r=await fetch('https://api.ipify.org?format=json'); const d=await r.json(); pub=d.ip; } catch { pub='获取失败'; } return { local, pub }; }
    async function renderDevice() {
      const container = document.getElementById('drawer-device'); if(!container) return;
      container.innerHTML = `<div class="loading-placeholder"><div class="loading-spinner"></div>正在获取设备信息...</div>`;
      const platform = await getRealPlatform(); const battery = await getBatteryInfo(); const gpu = getGPUInfo(); const ip = await getIPInfo();
      container.innerHTML = `
        <div class="device-grid-2x2">
          <div class="device-item"><div class="device-label">系统架构</div><div class="device-value">${platform}</div></div>
          <div class="device-item"><div class="device-label">电池状态</div><div class="device-value">${battery}</div></div>
          <div class="device-item"><div class="device-label">GPU</div><div class="device-value" style="font-size:0.9rem;">${gpu}</div></div>
          <div class="device-item"><div class="device-label">IP 地址</div><div class="device-value">公网：${ip.pub}<br>本地：${ip.local}</div></div>
        </div>
        <div class="drawer-footer-link">
          <button class="nav-btn" onclick="location.href='device.html'">查看完整设备信息 →</button>
        </div>
      `;
    }

    // HTML IDE
    function renderIDE() {
      const container = document.getElementById('drawer-ide');
      const saved = localStorage.getItem('ide_last_code') || `<h1>预览</h1><p>在左侧编辑，点击运行。</p>`;
      container.innerHTML = `
        <div class="ide-container">
          <div class="ide-editor"><textarea id="ideInput" class="ide-textarea">${saved.replace(/`/g,'\\`')}</textarea></div>
          <div class="ide-action-row">
            <button class="run-ide-btn" id="runIde">运行代码</button>
            <button class="nav-btn" onclick="location.href='ide.html'">在独立 IDE 中打开 →</button>
          </div>
          <div class="ide-preview"><iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe></div>
        </div>
      `;
      const ta=document.getElementById('ideInput'), btn=document.getElementById('runIde'), fr=document.getElementById('previewFrame');
      function update(){ const doc=fr.contentDocument||fr.contentWindow.document; doc.open(); doc.write(ta.value); doc.close(); }
      btn.addEventListener('click', update); update();
      ta.addEventListener('input', ()=> localStorage.setItem('ide_last_code', ta.value));
    }

    // Base64 编译抽屉
    function singleByteBase64(byte) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
      const first = (byte >> 2) & 0x3F;
      const second = ((byte & 0x03) << 4) & 0x3F;
      return chars[first] + chars[second] + "==";
    }

    // 将 ASCII 码转为可显示的转义形式
    function charToDisplay(code) {
      if (code >= 32 && code <= 126) {
        return String.fromCharCode(code);
      }
      switch (code) {
        case 0: return '\\0';
        case 8: return '\\b';
        case 9: return '\\t';
        case 10: return '\\n';
        case 11: return '\\v';
        case 12: return '\\f';
        case 13: return '\\r';
        default: return '\\x' + code.toString(16).toUpperCase().padStart(2, '0');
      }
    }

    function buildBase64Table() {
      let html = '<table class="base64-table"><thead><tr>';
      for (let c = 0; c < 4; c++) {
        const start = c * 32;
        const end = start + 31;
        html += `<th colspan="1">Chr ${start}-${end}</th><th colspan="1">Base64</th>`;
      }
      html += '</tr></thead><tbody>';

      for (let row = 0; row < 32; row++) {
        html += '<tr>';
        for (let col = 0; col < 4; col++) {
          const code = col * 32 + row;
          const displayChar = charToDisplay(code);
          const b64 = singleByteBase64(code);
          html += `<td class="char-cell">${displayChar}</td><td>${b64}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    function renderBase64() {
      const container = document.getElementById('drawer-base64');
      container.innerHTML = `
        <button class="nav-btn" onclick="location.href='tb64.html'">完整Base64编译</button>
        <div style="overflow-x:auto; padding-bottom: 60px;">
          ${buildBase64Table()}
        </div>
      `;
    }

    // 隐藏功能：连续点击标题 5 次解锁开发者指南
    (function() {
      const titleH1 = document.querySelector('.title-section h1');
      const badgeEl = document.querySelector('.badge');
      let clickCount = 0;
      let unlocked = false;

      titleH1.addEventListener('click', () => {
        if (unlocked) return;
        clickCount++;
        if (clickCount >= 5) {
          unlocked = true;
          badgeEl.textContent = '开发者指南';
          badgeEl.style.cursor = 'pointer';
          badgeEl.addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = 'guide.html';
          });
        }
      });

      document.addEventListener('click', function(e) {
        if (!unlocked && !titleH1.contains(e.target)) {
          clickCount = 0;
        }
      });
    })();

    buildModalSlides();
  })();
</script>
</body>
</html>
