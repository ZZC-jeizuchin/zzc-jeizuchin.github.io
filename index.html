<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="baiduspider" content="noindex, nofollow">
  <meta name="yandex" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">
  <title>SwCTools</title>
  <style>
    /* ===== 简洁版变量 · 无毛玻璃 ===== */
    :root {
      --bg-body: #e8edf2;
      --panel-bg: rgba(255, 255, 255, 0.85);
      --panel-border: #bdd1e6;
      --title-color: #1e4b6e;
      --badge-bg: #d0e2f0;
      --badge-color: #2c6182;
      --cat-btn-bg: #d9e8f4;
      --cat-btn-border: #adc7e0;
      --cat-btn-color: #1a4059;
      --cat-btn-hover-bg: #c2d8ed;
      --jump-row-bg: #e7f0f9;
      --jump-row-border: #c1d6ea;
      --input-border: #b3cce2;
      --input-focus-border: #4f7fa3;
      --go-btn-bg: #4f7f9e;
      --go-btn-hover-bg: #3a6b8c;
      --tool-btn-bg: #cddef0;
      --tool-btn-border: #a3bed8;
      --tool-btn-color: #1a4765;
      --modal-overlay-bg: rgba(22, 50, 70, 0.25);
      --modal-card-bg: #f3f9ff;
      --link-item-bg: #d9e8f4;
      --link-item-border: #adc7e0;
      --drawer-panel-bg: #f3f9ff;
      --device-item-bg: #eaf2fc;
      --device-label-color: #1e4b6e;
      --device-value-color: #0d3450;
      --text-color: #173e58;
      --corner-text-color: #3a6a8e;
      --fps-bg: rgba(255, 255, 255, 0.6);
    }

    [data-theme="dark"] {
      --bg-body: #0a0f14;
      --panel-bg: rgba(13, 27, 42, 0.9);
      --panel-border: #1e3a5a;
      --title-color: #a0c4e8;
      --badge-bg: #1a3a5c;
      --badge-color: #b0d0f0;
      --cat-btn-bg: #1e3a5a;
      --cat-btn-border: #2a5a8a;
      --cat-btn-color: #c0d8f0;
      --cat-btn-hover-bg: #2a5a8a;
      --jump-row-bg: #122a3e;
      --jump-row-border: #1e4a6e;
      --input-border: #2a5a8a;
      --input-focus-border: #5a9ac0;
      --go-btn-bg: #2a6a9e;
      --go-btn-hover-bg: #1a4a7a;
      --tool-btn-bg: #1e3a5a;
      --tool-btn-border: #2a5a8a;
      --tool-btn-color: #c0d8f0;
      --modal-overlay-bg: rgba(0, 20, 40, 0.5);
      --modal-card-bg: #0d1b2a;
      --link-item-bg: #1e3a5a;
      --link-item-border: #2a5a8a;
      --drawer-panel-bg: #0d1b2a;
      --device-item-bg: #122a3e;
      --device-label-color: #a0c4e8;
      --device-value-color: #d0e0f0;
      --text-color: #c0d8f0;
      --corner-text-color: #7a9ab0;
      --fps-bg: rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
    }

    .corner-tl {
      position: fixed;
      top: 12px;
      left: 16px;
      font-size: 0.75rem;
      color: var(--corner-text-color);
      opacity: 0.8;
      font-weight: 400;
      z-index: 10;
      pointer-events: none;
    }

    .corner-tr {
      position: fixed;
      top: 12px;
      right: 20px;
      font-size: 0.75rem;
      color: var(--corner-text-color);
      opacity: 0.8;
      font-weight: 400;
      z-index: 10;
      pointer-events: none;
      background: var(--fps-bg);
      padding: 4px 12px;
      border-radius: 24px;
      border: 1px solid var(--panel-border);
    }

    .corner-br {
      position: fixed;
      bottom: 12px;
      right: 20px;
      font-size: 0.75rem;
      color: var(--corner-text-color);
      opacity: 0.8;
      font-weight: 400;
      z-index: 10;
      pointer-events: none;
    }

    .theme-toggle {
      position: fixed;
      bottom: 12px;
      left: 16px;
      font-size: 1rem;
      background: var(--cat-btn-bg);
      border: 1px solid var(--panel-border);
      color: var(--corner-text-color);
      padding: 6px 16px;
      border-radius: 32px;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s, background 0.2s, transform 0.1s;
      z-index: 20;
      font-weight: 500;
    }

    .theme-toggle:hover {
      opacity: 1;
      background: var(--cat-btn-hover-bg);
      transform: translateY(-1px);
    }

    .main-panel {
      max-width: 1280px;
      width: 100%;
      background: var(--panel-bg);
      border-radius: 28px;
      box-shadow: 0 16px 30px -8px rgba(30, 65, 90, 0.18);
      border: 1px solid var(--panel-border);
      padding: 20px 24px 24px;
      position: relative;
    }

    .title-section {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--panel-border);
    }

    .title-section h1 {
      font-weight: 550;
      font-size: 2rem;
      color: var(--title-color);
    }

    .badge {
      color: var(--badge-color);
      background: var(--badge-bg);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid var(--cat-btn-border);
    }

    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .cat-btn {
      background: var(--cat-btn-bg);
      border: 1px solid var(--cat-btn-border);
      color: var(--cat-btn-color);
      padding: 12px 22px;
      border-radius: 40px;
      font-weight: 520;
      font-size: 1rem;
      box-shadow: 0 3px 6px rgba(50, 85, 110, 0.05);
      cursor: pointer;
      transition: all 0.15s ease;
      flex: 0 1 auto;
    }

    .cat-btn:hover {
      background: var(--cat-btn-hover-bg);
      border-color: #7fa5c5;
      transform: translateY(-1px);
      box-shadow: 0 6px 10px rgba(46, 82, 110, 0.08);
    }

    .jump-section { margin: 8px 0 12px; }

    .jump-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      background: var(--jump-row-bg);
      padding: 10px 18px;
      border-radius: 60px;
      margin-bottom: 12px;
      border: 1px solid var(--jump-row-border);
    }

    .jump-row input, .jump-row select {
      flex: 4 1 180px;
      padding: 14px 18px;
      border: 1.5px solid var(--input-border);
      border-radius: 48px;
      background: var(--panel-bg);
      font-size: 0.95rem;
      outline: none;
      color: var(--text-color);
      transition: border 0.15s, box-shadow 0.15s;
    }

    .jump-row select {
      flex: 1 1 130px;
      cursor: pointer;
    }

    .jump-row input:focus, .jump-row select:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px rgba(79,127,163,0.2);
    }

    .go-btn {
      background: var(--go-btn-bg);
      border: none;
      color: white;
      padding: 14px 28px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 5px 10px rgba(46,84,112,0.15);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }

    .go-btn:hover {
      background: var(--go-btn-hover-bg);
      transform: scale(1.02);
      box-shadow: 0 8px 14px rgba(39, 77, 105, 0.2);
    }

    .tools-bar {
      display: flex;
      gap: 12px;
      margin: 14px 0 8px;
    }

    .tool-btn {
      background: var(--tool-btn-bg);
      border: 1px solid var(--tool-btn-border);
      color: var(--tool-btn-color);
      padding: 14px 20px;
      border-radius: 56px;
      font-weight: 550;
      font-size: 1.05rem;
      cursor: pointer;
      flex: 1 1 0;
      text-align: center;
      transition: all 0.15s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .tool-btn:hover {
      background: #bcd1e9;
      border-color: #7b9fc2;
      transform: translateY(-1px);
      box-shadow: 0 6px 10px rgba(46,82,110,0.06);
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay-bg);
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { visibility: visible; opacity: 1; }

    .modal-card {
      background: var(--modal-card-bg);
      width: 90%;
      max-width: 700px;
      max-height: 70vh;
      border-radius: 32px;
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 40px rgba(28, 60, 84, 0.25);
      padding: 24px 28px;
      transform: scale(0.95);
      transition: transform 0.2s;
      overflow-y: auto;
    }

    .modal-overlay.show .modal-card { transform: scale(1); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 12px;
    }

    .modal-header h3 { color: var(--title-color); font-size: 1.7rem; font-weight: 550; }

    .modal-close {
      background: none;
      border: none;
      font-size: 32px;
      cursor: pointer;
      color: var(--corner-text-color);
      transition: transform 0.1s;
    }

    .modal-close:hover { transform: scale(1.1); }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .link-item {
      background: var(--link-item-bg);
      border: 1px solid var(--link-item-border);
      color: var(--cat-btn-color);
      padding: 14px 8px;
      border-radius: 40px;
      text-align: center;
      text-decoration: none;
      font-weight: 520;
      font-size: 0.95rem;
      transition: all 0.15s;
      display: block;
    }

    .link-item:hover {
      background: var(--cat-btn-hover-bg);
      border-color: #7fa5c5;
      transform: translateY(-2px);
      box-shadow: 0 6px 10px rgba(46, 82, 110, 0.08);
    }

    .drawer-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay-bg);
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
      z-index: 1000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .drawer-overlay.show { visibility: visible; opacity: 1; }

    .drawer-panel {
      background: var(--drawer-panel-bg);
      width: 100%;
      border-radius: 32px 32px 0 0;
      border: 1px solid var(--panel-border);
      height: 80vh;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    .drawer-overlay.show .drawer-panel { transform: translateY(0); }

    .drawer-header {
      padding: 22px 28px 14px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--panel-border);
    }

    .drawer-close {
      background: none;
      border: none;
      font-size: 36px;
      cursor: pointer;
      color: var(--corner-text-color);
    }

    .drawer-content { padding: 24px 28px; overflow-y: auto; flex: 1; color: var(--text-color); }

    /* 设备信息 2x2 网格 */
    .device-grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .device-item {
      background: var(--device-item-bg);
      border-radius: 24px;
      padding: 18px 20px;
      border: 1px solid var(--panel-border);
    }

    .device-label {
      font-weight: 600;
      color: var(--device-label-color);
      margin-bottom: 10px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .device-value { color: var(--device-value-color); word-break: break-word; font-size: 1.1rem; }

    .ide-container { display: flex; flex-direction: column; gap: 20px; }
    .ide-editor { background: var(--panel-bg); border-radius: 28px; border: 2px solid var(--input-border); overflow: hidden; }
    .ide-textarea {
      width: 100%; padding: 24px; font-family: 'JetBrains Mono', monospace;
      font-size: 15px; background: transparent; border: none; outline: none;
      color: var(--text-color); resize: vertical; min-height: 240px;
    }
    .ide-preview { background: white; border-radius: 24px; border: 2px solid var(--input-border); padding: 20px; }
    .ide-preview iframe { width: 100%; height: 280px; border: none; background: white; border-radius: 16px; }

    /* 运行按钮与独立链接同行 */
    .ide-action-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .run-ide-btn {
      background: var(--go-btn-bg);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 56px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(46,84,112,0.2);
      transition: background 0.15s;
    }

    .run-ide-btn:hover {
      background: var(--go-btn-hover-bg);
    }

    .ide-external-link {
      background: var(--tool-btn-bg);
      border: 1px solid var(--tool-btn-border);
      color: var(--tool-btn-color);
      padding: 12px 24px;
      border-radius: 48px;
      text-decoration: none;
      font-weight: 550;
      transition: all 0.15s;
    }

    .ide-external-link:hover {
      background: var(--cat-btn-hover-bg);
      border-color: #7b9fc2;
      transform: translateY(-1px);
    }

    .para-content {
      background: var(--device-item-bg);
      padding: 24px 28px;
      border-radius: 24px;
      color: var(--text-color);
      border-left: 6px solid #5982a3;
      line-height: 1.7;
    }

    .drawer-footer-link {
      margin-top: 24px;
      text-align: center;
    }

    .drawer-footer-link a {
      background: var(--go-btn-bg);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: background 0.15s;
    }

    .drawer-footer-link a:hover {
      background: var(--go-btn-hover-bg);
    }

    .loading-placeholder { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .loading-spinner {
      width: 28px; height: 28px; border: 3px solid rgba(79, 127, 158, 0.2);
      border-top-color: #4f7f9e; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-right: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .device-grid-2x2 { grid-template-columns: 1fr; }
      .main-panel { padding: 16px 16px 20px; }
      .ide-action-row { flex-direction: column; align-items: stretch; }
    }

    @media (max-width: 480px) {
      .category-bar { justify-content: center; }
      .jump-row .go-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="corner-tl">不自由毋宁死 · 不自由毋寧死 · Give me liberty or give me death · 自由か、死か</div>
  <div class="corner-tr" id="fpsDisplay">FPS: --</div>
  <div class="corner-br">made by ZZC-jeizuchin, Github</div>
  <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">🌙 深色</button>

<div class="main-panel">
  <div class="title-section">
    <h1>Seewo Crack Tools</h1>
    <span class="badge">自由工具箱</span>
  </div>

  <div class="category-bar">
    <button class="cat-btn" data-cat="ai">AI工具</button>
    <button class="cat-btn" data-cat="search">搜索引擎</button>
    <button class="cat-btn" data-cat="media">通信音乐</button>
    <button class="cat-btn" data-cat="dev">开发</button>
    <button class="cat-btn" data-cat="other">其他</button>
  </div>

  <div class="jump-section">
    <div class="jump-row">
      <input type="text" id="customUrlInput" placeholder="输入网址，回车或点击跳转">
      <button class="go-btn" id="jumpBtn">前往</button>
    </div>
    <div class="jump-row">
      <input type="text" id="baiduImageInput" placeholder="百度图片搜索关键词" autocomplete="off">
      <button class="go-btn" id="baiduImageBtn">搜图</button>
    </div>
    <div class="jump-row">
      <select id="searchEngineSelect">
        <option value="baidu">百度</option>
        <option value="google">Google</option>
        <option value="yandex">Yandex</option>
        <option value="bing">Bing</option>
        <option value="duckduckgo">DuckDuckGo</option>
      </select>
      <input type="text" id="searchKeywordInput" placeholder="输入搜索关键词" autocomplete="off">
      <button class="go-btn" id="searchEngineBtn">搜索</button>
    </div>
  </div>

  <div class="tools-bar">
    <button class="tool-btn" id="showDeviceInfoBtn">设备信息</button>
    <button class="tool-btn" id="showIdeBtn">HTML IDE</button>
    <button class="tool-btn" id="showParaBtn">使用指南</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <div class="modal-header">
      <h3 id="modalTitle">分类</h3>
      <button class="modal-close" id="modalCloseBtn">&times;</button>
    </div>
    <div class="link-grid" id="modalLinkGrid"></div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer-panel">
    <div class="drawer-header">
      <h3 id="drawerTitle">设备信息</h3>
      <button class="drawer-close" id="closeDrawerBtn">&times;</button>
    </div>
    <div class="drawer-content" id="drawerContent"></div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // 深色模式
    const themeToggle = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('swc_theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '🌙 深色' : '☀️ 亮色';
    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('swc_theme', newTheme);
      themeToggle.textContent = newTheme === 'light' ? '🌙 深色' : '☀️ 亮色';
    });

    // 帧率
    const fpsDisplay = document.getElementById('fpsDisplay');
    let frameCount = 0, lastFpsUpdate = performance.now();
    function updateFPS() {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsUpdate >= 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0; lastFpsUpdate = now;
      }
      requestAnimationFrame(updateFPS);
    }
    requestAnimationFrame(updateFPS);

    // 链接库
    const linkDB = {
      ai: [
        { name: 'DeepSeek', url: 'https://chat.deepseek.com' },
        { name: 'Doubao', url: 'https://www.doubao.com' },
        { name: 'Qwen (通义千问)', url: 'https://tongyi.aliyun.com/qianwen' },
        { name: 'Kimi', url: 'https://kimi.moonshot.cn' }
      ],
      search: [
        { name: 'Google', url: 'https://www.google.com' },
        { name: 'Bing (国内)', url: 'https://cn.bing.com' },
        { name: 'Bing (国际)', url: 'https://www.bing.com' },
        { name: 'MSN', url: 'https://www.msn.com' },
        { name: 'DuckDuckGo', url: 'https://duckduckgo.com' },
        { name: 'Baidu', url: 'https://baidu.com' },
        { name: 'Yandex', url: 'https://yandex.com' },
        { name: 'Yandex RU', url: 'https://yandex.ru' },
        { name: 'Bilibili', url: 'https://bilibili.com' }
      ],
      media: [
        { name: '自由公园', url: 'https://ziyoupark.com' },
        { name: 'XCloud Music', url: 'https://music.xcloudv.top' },
        { name: 'PJMP3', url: 'https://pjmp3.com' },
        { name: 'PeanutDL', url: 'https://peanutdl.com' },
        { name: 'WyAPI', url: 'https://wyapi.toubiec.cn' }
      ],
      dev: [
        { name: 'GitHub', url: 'https://github.com' },
        { name: 'IP.SB', url: 'https://www.ip.sb' },
        { name: 'Intel', url: 'https://www.intel.com' },
        { name: 'AMD', url: 'https://www.amd.com' },
        { name: 'NVIDIA', url: 'https://www.nvidia.com' },
        { name: 'Lenovo', url: 'https://www.lenovo.com' },
        { name: 'Huawei', url: 'https://www.huawei.com' },
        { name: 'Apple', url: 'https://www.apple.com' },
        { name: 'Microsoft', url: 'https://www.microsoft.com' },
        { name: 'cpp.sh', url: 'https://cpp.sh' },
        { name: 'Python (官网)', url: 'https://www.python.org' },
        { name: 'Python IDE', url: 'https://www.programiz.com/python-programming/online-compiler/' },
        { name: 'Cloudflare', url: 'https://www.cloudflare.com' }
      ],
      other: [
        { name: 'MMPan.top', url: 'https://mmpan.top' },
        { name: 'CNN Edition', url: 'https://edition.cnn.com' },
        { name: 'Poki', url: 'https://poki.com' },
        { name: 'Steam', url: 'https://store.steampowered.com' },
        { name: 'Slow Roads', url: 'https://slowroads.io' }
      ]
    };
    const catNames = { ai:'AI工具', search:'搜索引擎', media:'通信音乐', dev:'开发', other:'其他' };

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalGrid = document.getElementById('modalLinkGrid');
    const modalClose = document.getElementById('modalCloseBtn');
    document.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        modalTitle.textContent = catNames[cat];
        modalGrid.innerHTML = linkDB[cat].map(l => 
          `<a class="link-item" href="${l.url}" target="_blank" rel="noopener">${l.name}</a>`
        ).join('');
        modalOverlay.classList.add('show');
      });
    });
    modalClose.addEventListener('click', ()=> modalOverlay.classList.remove('show'));
    modalOverlay.addEventListener('click', e=> { if(e.target===modalOverlay) modalOverlay.classList.remove('show'); });
    document.addEventListener('keydown', e=> { if(e.key==='Escape' && modalOverlay.classList.contains('show')) modalOverlay.classList.remove('show'); });

    function performJump(url, addTimestamp = true) {
      if (!url) return;
      let final = url;
      if (!/^https?:\/\//i.test(final)) final = 'https://' + final;
      if (addTimestamp) final += (final.includes('?') ? '&' : '?') + '_t=' + Date.now();
      const newWin = window.open(final, '_blank', 'noopener,noreferrer');
      if (!newWin) window.location.href = final;
    }

    function getHistory(key) {
      try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
    }
    function addHistory(key, value) {
      if (!value.trim()) return;
      let hist = getHistory(key);
      hist = hist.filter(v => v !== value);
      hist.unshift(value);
      if (hist.length > 4) hist.pop();
      localStorage.setItem(key, JSON.stringify(hist));
    }
    function setupHistoryInput(inputEl, storageKey) {
      const datalistId = `dl_${storageKey}`;
      let dl = document.getElementById(datalistId);
      if (!dl) {
        dl = document.createElement('datalist');
        dl.id = datalistId;
        inputEl.setAttribute('list', datalistId);
        inputEl.parentNode?.appendChild(dl);
      }
      function refreshDatalist() {
        const hist = getHistory(storageKey);
        dl.innerHTML = hist.map(v => `<option value="${v}">`).join('');
      }
      inputEl.addEventListener('focus', refreshDatalist);
      return { add: (v) => { addHistory(storageKey, v); } };
    }

    const imgInput = document.getElementById('baiduImageInput');
    const engineInput = document.getElementById('searchKeywordInput');
    const imgHistory = setupHistoryInput(imgInput, 'baidu_img_hist');
    const engineHistory = setupHistoryInput(engineInput, 'engine_hist');

    const inputUrl = document.getElementById('customUrlInput');
    const jumpBtn = document.getElementById('jumpBtn');
    jumpBtn.addEventListener('click', ()=> { const raw = inputUrl.value.trim(); if(raw) performJump(raw, false); });
    inputUrl.addEventListener('keydown', e=> { if(e.key==='Enter'){ e.preventDefault(); jumpBtn.click(); }});

    const baiduBtn = document.getElementById('baiduImageBtn');
    baiduBtn.addEventListener('click', ()=> { 
      const kw = imgInput.value.trim(); 
      if(kw) { imgHistory.add(kw); performJump('https://image.baidu.com/search/index?tn=baiduimage&ie=utf-8&word='+encodeURIComponent(kw), false); }
    });
    imgInput.addEventListener('keydown', e=> { if(e.key==='Enter'){ e.preventDefault(); baiduBtn.click(); }});

    const engineSelect = document.getElementById('searchEngineSelect');
    const searchBtn = document.getElementById('searchEngineBtn');
    function getEngineSearchUrl(engine, query) {
      const encoded = encodeURIComponent(query);
      const engines = {
        baidu: `https://www.baidu.com/s?wd=${encoded}`,
        google: `https://www.google.com/search?q=${encoded}`,
        yandex: `https://yandex.com/search/?text=${encoded}`,
        bing: `https://www.bing.com/search?q=${encoded}`,
        duckduckgo: `https://duckduckgo.com/?q=${encoded}`
      };
      return engines[engine] || engines.baidu;
    }
    function performEngineSearch() {
      const engine = engineSelect.value;
      const query = engineInput.value.trim();
      if (!query) return;
      engineHistory.add(query);
      performJump(getEngineSearchUrl(engine, query), true);
    }
    searchBtn.addEventListener('click', performEngineSearch);
    engineInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); performEngineSearch(); } });

    const overlay = document.getElementById('drawerOverlay');
    const drawerTitle = document.getElementById('drawerTitle');
    const drawerContent = document.getElementById('drawerContent');
    const closeBtn = document.getElementById('closeDrawerBtn');
    function openDrawer(title, html) { drawerTitle.textContent = title; drawerContent.innerHTML = html; overlay.classList.add('show'); }
    function closeDrawer() { overlay.classList.remove('show'); }
    closeBtn.addEventListener('click', closeDrawer);
    overlay.addEventListener('click', e=> { if(e.target===overlay) closeDrawer(); });
    document.addEventListener('keydown', e=> { if(e.key==='Escape' && overlay.classList.contains('show')) closeDrawer(); });

    // 精简设备信息（四项）
    async function getRealPlatform() {
      if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
        try {
          const uaData = await navigator.userAgentData.getHighEntropyValues(['platform', 'architecture', 'bitness']);
          return `${uaData.platform} (${uaData.architecture}, ${uaData.bitness}-bit)`;
        } catch {}
      }
      const ua = navigator.userAgent;
      if (ua.includes('Win64') || ua.includes('WOW64')) return 'Windows (x64, 64-bit)';
      if (ua.includes('Win32')) return 'Windows (x86, 32-bit)';
      if (ua.includes('Mac OS X')) return 'macOS';
      if (ua.includes('Linux')) return 'Linux';
      return navigator.platform;
    }

    async function getBatteryInfo() {
      if (!navigator.getBattery) return '不支持';
      const b = await navigator.getBattery();
      return `${Math.round(b.level*100)}% ${b.charging ? '⚡充电中' : '🔋使用中'}`;
    }

    function getGPUInfo() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return 'WebGL不支持';
        const ext = gl.getExtension('WEBGL_debug_renderer_info');
        if (!ext) return '扩展不可用';
        return gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '未知';
      } catch { return '获取失败'; }
    }

    async function getIPInfo() {
      let local = '获取中...', pub = '获取中...';
      try {
        const pc = new RTCPeerConnection();
        pc.createDataChannel('');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        local = await new Promise(r => {
          pc.onicecandidate = e => {
            if (e.candidate) {
              const m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
              if (m) r(m[0]);
            } else r('未检测到');
          };
          setTimeout(() => r('超时'), 2000);
        });
      } catch { local = '不可用'; }
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        pub = data.ip;
      } catch { pub = '获取失败'; }
      return { local, pub };
    }

    async function renderDevice() {
      drawerContent.innerHTML = `<div class="loading-placeholder"><div class="loading-spinner"></div>正在获取设备信息...</div>`;
      
      const platform = await getRealPlatform();
      const battery = await getBatteryInfo();
      const gpu = getGPUInfo();
      const ip = await getIPInfo();

      drawerContent.innerHTML = `
        <div class="device-grid-2x2">
          <div class="device-item"><div class="device-label">系统架构</div><div class="device-value">${platform}</div></div>
          <div class="device-item"><div class="device-label">电池状态</div><div class="device-value">${battery}</div></div>
          <div class="device-item"><div class="device-label">GPU</div><div class="device-value" style="font-size:0.9rem;">${gpu}</div></div>
          <div class="device-item"><div class="device-label">IP 地址</div><div class="device-value">公网：${ip.pub}<br>本地：${ip.local}</div></div>
        </div>
        <div class="drawer-footer-link">
          <a href="device.html" target="_blank">查看完整设备信息 →</a>
        </div>
        <button class="tool-btn" id="refreshDevice" style="margin-top:20px;">刷新信息</button>
      `;
      document.getElementById('refreshDevice')?.addEventListener('click', renderDevice);
    }

    document.getElementById('showDeviceInfoBtn').addEventListener('click', ()=>{
      openDrawer('设备信息', '');
      renderDevice();
    });

    // HTML IDE（嵌入版 + 独立链接同行）
    document.getElementById('showIdeBtn').addEventListener('click', ()=>{
      const savedCode = localStorage.getItem('ide_last_code') || `<h1>预览</h1><p>在左侧编辑，点击运行。</p>`;
      openDrawer('HTML IDE', `
        <div class="ide-container">
          <div class="ide-editor">
            <textarea id="ideInput" class="ide-textarea" placeholder="<h1>Hello SwC!</h1>">${savedCode.replace(/`/g,'\\`')}</textarea>
          </div>
          <div class="ide-action-row">
            <button class="run-ide-btn" id="runIde">运行代码</button>
            <a href="ide.html" target="_blank" class="ide-external-link">在独立 IDE 中打开 →</a>
          </div>
          <div class="ide-preview"><iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe></div>
        </div>
      `);
      const ta=document.getElementById('ideInput'), btn=document.getElementById('runIde'), fr=document.getElementById('previewFrame');
      function update(){ const doc=fr.contentDocument||fr.contentWindow.document; doc.open(); doc.write(ta.value); doc.close(); }
      btn.addEventListener('click', update); update();
      ta.addEventListener('input', () => localStorage.setItem('ide_last_code', ta.value));
    });

    // 使用指南精简版
    document.getElementById('showParaBtn').addEventListener('click', ()=>{
      openDrawer('使用指南', `
        <div class="para-content">
          <strong style="font-size:1.2rem;">SwCTools · 希沃工具箱</strong>
          <p style="margin-top:12px;">本工具由 ZZC-jeizuchin 开发，旨在为希沃学习平板用户提供便捷的网页跳转、搜索、设备信息查询及 HTML 在线调试功能。</p>
          <p>项目完全开源，遵循自由与分享的精神。</p>
          <div class="drawer-footer-link">
            <a href="guide.html" target="_blank">查看完整使用指南 →</a>
          </div>
        </div>
      `);
    });

  })();
</script>
</body>
</html>
